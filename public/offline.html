<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realty Assistant - Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; background: #F8F6F1; color: #1F2933; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .panel { max-width: 520px; width: 100%; background: #fff; border-radius: 28px; border: 1px solid #E6DFD2; box-shadow: 0 28px 70px rgba(15,23,42,.08); padding: 32px; }
      h1 { margin-top: 0; font-size: 2rem; }
      p { margin: 16px 0 0; color: #6B7280; line-height: 1.75; }
      a { color: #C89B3C; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Offline mode activated</h1>
      <p>Realty Assistant is still available even without a network connection. Your dashboard, recent activity, and forms remain accessible with the most recent cached content.</p>
      <p><a href="/">Return to the app</a></p>
    </div>
  </body>
</html>
